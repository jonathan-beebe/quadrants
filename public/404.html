<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Quadrants</title>
    <script>
      // GitHub Pages SPA redirect (step 1 of 2)
      //
      // GitHub Pages serves this file for any unknown path. We save the
      // original URL in sessionStorage and redirect to the base path so
      // index.html can load. Step 2 happens in index.html, which reads
      // sessionStorage.redirect and calls history.replaceState to restore
      // the URL before the React app boots.
      //
      // During local development, vite.config.js serves this file via
      // ghPages404Plugin to match production behavior.
      var pathSegmentsToKeep = 1; // keep /quadrants/
      var l = window.location;
      sessionStorage.redirect = l.pathname + l.search + l.hash;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/',
      );
    </script>
  </head>
  <body></body>
</html>
